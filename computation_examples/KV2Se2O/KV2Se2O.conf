#This is the configuration file for KV2Se2O computations
#the format is key=value
#matches: key=value
# my-key = value
# my.key= value with spaces
#KEY_NAME =   value123
# complex-key.name = some value here
#does not match:
# = value              # No key
# key =                # No value, this must be filled
# key value            # No equals sign
# my key = value       # Space in key (not allowed)
# key==value          # Multiple equals (first = becomes part of key)

#name of the system
name=KV2Se2O

#dimension of system
dim=2

#directions to study, available directions x,y,z
directions_to_study=x,y

#whether spin is considered
spin=True

truncation_radius=8.2


lattice_basis=4.0525, 0.0, 0.0; 0.0, 4.0525, 0.0; 0.0, 0.0, 8.4336


space_group=None

space_group_origin=0,0,0

space_group_name_H_M=None

cell_setting=None

# --- Magnetic Space Group Metadata ---
space_group_magn_number_BNS=123.342
space_group_magn_name_UNI=P4'/mm'm
space_group_magn_name_BNS=P4'/mm'm
space_group_magn_number_OG=123.4.1002
space_group_magn_name_OG=P4'/mm'm
point_group_number_Litvin=15.4.56
point_group_name_UNI=4'/mm'm

Wyckoff_position_num=4


#Wyckoff position label O0, input orbitals
#O0_orbitals=
#one position of O0, coefficients  (fractional coordinates)
#O0_position_coefs=0.0, 0.0, 0.0

#Wyckoff position label V0, input orbitals
V0_orbitals=3dxz,3dxy
#one position of V0, coefficients  (fractional coordinates)
V0_position_coefs=0.0, 0.5, 0.0

#Wyckoff position label Se0, input orbitals
#Se0_orbitals=
#one position of Se0, coefficients  (fractional coordinates)
#Se0_position_coefs=0.5, 0.5, 0.15

#Wyckoff position label K0, input orbitals
#K0_orbitals=
#one position of K0, coefficients  (fractional coordinates)
#K0_position_coefs=0.0, 0.0, 0.5
